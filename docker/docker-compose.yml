services:
  mongodb:
    image: mongo:latest 

    container_name: mongodb

    ports:
      - "27017:27017"

    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    
    volumes:
      - mongodb:/data/db

    networks:
      - backend

    restart: always

  
  pgvector:
    image: pgvector/pgvector:0.8.2-pg18-trixie

    container_name: pgvector

    ports:
      - "5432:5432"

    volumes:
      - pgvector_data:/var/lib/postgresql
    
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

    networks:
      - backend
    
    restart: always


networks:
  backend:

volumes:
  mongodb:
  pgvector_data:
