services:

  # FastAPI application


  # Nginx Service


  # PostgreSQL Service (PGVector)
  pgvector:

    image: pgvector/pgvector:0.8.2-pg18-trixie
  
    container_name: pgvector
  
    ports:
      - "5432:5432"
  
    volumes:
      - pgvector_data:/var/lib/postgresql
  
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
  
    env_file:
      - ./env/.env.postgres
  
    networks:
      - backend
  
    restart: always
  
    healthcheck:
      test: ["CMD_SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Qdrant Service
  qdrant:

    image: qdrant/qdrant:v1.18

    container_name: qdrant

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_data:/qdrant/storage

    networks:
      - backend

    restart: always
    

  # Prometheus Monitoring 
  prometheus:

    image: prom/prometheus:v3.11.3

    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

    networks:
      - backend

    restart: always

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'


  # Grafana Dashboard
  grafana:

    image: grafana/grafana:13.0.1-security-01-ubuntu

    container_name: grafana

    ports:
      - "3000:3000"

    volumes:
      - grafana_data:/var/lib/grafana

    env_file:
      - ./env/.env.grafana

    depends_on:
      - prometheus

    networks:
      - backend

    restart: always


  # Node Exporter for system Metrics
  node_exporter:

    image: prom/node-exporter:v1.11.1

    container_name: node-exporter

    ports:
      - "9100:9100"

    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

    command: 
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-excluded=^/(sys|proc|dev|host|etc)($$|/)'

    networks:
      - backend

    restart: always


  # PostgreSQL Exporter for Postgres Metrics
  postgres_exporter:
  
    image: prometheuscommunity/postgres-exporter:v0.19.1
  
    container_name: postgres-exporter
  
    ports:
      - "9187:9187"
  
    env_file:
      - ./env/.env.postgres-exporter
  
    depends_on:
      - pgvector

    networks:
      - backend

    restart: always